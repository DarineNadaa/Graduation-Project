<ossec_config>

  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>wazuh.manager</manager_address>
      <port>1515</port>
      <agent_name>target-agent</agent_name>
    </enrollment>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- nginx access log: apache combined format -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- Flask app JSON log: custom application-level events -->
  <localfile>
    <log_format>json</log_format>
    <location>/app/logs/app.log</location>
  </localfile>

  <!-- Syslog / auth for any future sshd scenarios -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- File Integrity Monitoring: watch uploads dir -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>60</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes" report_changes="yes" realtime="yes">/app/static/uploads</directories>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>

  <sca>
    <enabled>no</enabled>
  </sca>

  <active-response>
    <disabled>yes</disabled>
  </active-response>

  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
