# Cortex configuration
#
# play.http.secret.key — Play Framework session/cookie signing secret.
# Used to sign session cookies and CSRF tokens so they cannot be forged.
# Must be at least 32 characters; we use 96-char random hex for safety.
# Value is injected from secrets/ATTENSE.env via the CORTEX_PLAY_SECRET
# environment variable set in docker-compose.yml.
play.http.secret.key = "5f6e69909a9ca4768d36c3f418a9a6e0857a0eac393d18071291f0971abc7e80f3dd02112b7f4505ae8f17eb8500aa61"
play.http.secret.key = ${?CORTEX_PLAY_SECRET}

search {
  index = cortex
  uri = "http://elasticsearch:9200"
}

# Authentication: local users defined via the UI
auth {
  providers = [local]
  defaults.permissions = ["read", "analyze", "execute"]
}

cache.job = 10 minutes
job.timeout = 30 minutes
job.runners = [process, docker]

responder {
  # `responder.path` is deprecated and does not actually load local
  # responders in this Cortex version (confirmed: WorkerSrv's "New worker
  # list" only ever contained the public catalog's analyzers, never any of
  # our local responders). `responder.urls` is the replacement, and also
  # accepts a local filesystem path alongside/instead of remote catalog URLs.
  urls = [
    "/opt/cortex/responders"
  ]
}
