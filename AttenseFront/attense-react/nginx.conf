server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback for client-side routed paths; static public/*.html pages
    # still resolve directly since try_files checks the real file first.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|ico|webp|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
