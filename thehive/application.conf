db.janusgraph {
  storage.cql.cluster-name = hive
  index.search {
    backend = elasticsearch
    hostname = ["elasticsearch"]
  }
}

# Webhook notifications (TheHive 4.x format).
# TheHive POSTs every audit event (Case/Alert/Task/Observable create+update)
# to this endpoint, which is how the Blue Team backend learns about analyst
# actions and auto-attaches the attacker activity log on case creation.
# NOTE: the older `notification.notifier.webhook.default` form is NOT honoured
# by TheHive 4 — endpoints must be declared as the array below.
notification.webhook.endpoints = [
  {
    name = local
    url = "http://attense-app:8010/internal/webhook/hive"
    version = 0
    wsConfig = {}
    # TheHive sends `Authorization: Bearer <key>` on every webhook so the Blue
    # Team endpoint can verify the request really came from TheHive. This key
    # MUST equal attense-app's WEBHOOK_SECRET. The default below matches the
    # dev default; the `${?WEBHOOK_SECRET}` line overrides it from the env var
    # (set identically on both containers in docker-compose) when present.
    auth {
      type = "bearer"
      key = "changeme-webhook"
      key = ${?WEBHOOK_SECRET}
    }
    # Org(s) allowed to use this webhook. MANAGED AUTOMATICALLY by
    # scripts/setup_thehive.py, which rewrites this line to match THEHIVE_ORG_NAME
    # (so a different org works with no hand-editing). The value below is just the
    # default. NOTE: TheHive 4.1.24 does NOT treat "all" as a wildcard and the
    # match is CASE-SENSITIVE — the org name must appear here verbatim, else
    # TheHive raises "organisation <x> is not authorised to use the webhook".
    includedTheHiveOrganisations = ["ATTENSE"]
    excludedTheHiveOrganisations = []
  }
]

