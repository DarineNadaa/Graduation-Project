server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Health of the frontend itself
    location = /frontend-health {
        access_log off;
        return 200 "ok\n";
    }

    # Proxy REST API to the backend
    location /api/ {
        proxy_pass         http://red-team-backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy /health too (for parity)
    location = /health {
        proxy_pass         http://red-team-backend:8000/health;
        proxy_set_header   Host $host;
    }

    # Proxy vulnerable target pages. Browser → /target/auth/login →
    # http://target-agent/auth/login. X-Forwarded-Prefix tells the Flask app
    # to emit URLs prefixed with /target/ so forms, links and redirects stay
    # inside the iframe.
    location /target/ {
        rewrite            ^/target/(.*)$ /$1 break;
        proxy_pass         http://target-agent;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /target;
        proxy_read_timeout 60s;
        # Local lab only — strip any frame-blocking headers so the iframe
        # in the LabBrowser can render the page.
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
    }

    # Operator-mode parallel target. Same UI (templates), DIFFERENT backend
    # logic — harder credentials, partial sanitization, etc. The iframe in
    # operator mode loads /target-op/... ; this proxy rewrites to /op/... on
    # target-agent where the routes_op blueprints are mounted.
    location /target-op/ {
        rewrite            ^/target-op/(.*)$ /op/$1 break;
        proxy_pass         http://target-agent;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /target-op;
        proxy_read_timeout 60s;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
    }


    # WebSocket shell — requires Upgrade headers
    location /ws/ {
        proxy_pass          http://red-team-backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
