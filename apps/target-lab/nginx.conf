worker_processes 1;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;

    # Combined log format — parsed by Wazuh agent via ossec.conf (log_format=apache)
    log_format combined_ext '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log combined_ext;

    sendfile           on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        server_name _;

        # ── Proxy all traffic to Flask vulnerable app on port 5000 ───────────
        location / {
            proxy_pass         http://127.0.0.1:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Static uploads served directly (intentional — APP-04) ────────────
        location /static/uploads/ {
            alias /app/static/uploads/;
            autoindex on;
        }
    }
}
