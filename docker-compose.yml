# =============================================================================
# ATTENSE Cyber Range — docker-compose.yml (v6 - Guided Lab)
# =============================================================================
# Services:
#   - target-agent        Purposefully vulnerable web app (Flask)
#   - wazuh-manager       Wazuh SIEM manager
#   - signal-store        Detection pipeline
#   - attense-app         Dashboard / monitoring
#   - red-team-backend    FastAPI API (sessions, progress, operator)
#   - red-team-frontend   React UI served by nginx
#   - attackbox           Lightweight pen-test tools container
#   - zap                 OWASP ZAP proxy (local-only)
# =============================================================================

services:

  # ── Target: Nginx + Flask vulnerable app + Wazuh agent ──────────────────────
  target-agent:
    build:
      context: ./target-agent
    container_name: attense_target_agent
    hostname: target-agent
    restart: unless-stopped
    depends_on:
      wazuh-manager:
        condition: service_healthy
    # Wazuh's firewall-drop active-response runs iptables on this agent —
    # iptables needs NET_ADMIN, which containers don't have by default.
    cap_add:
      - NET_ADMIN
    ports:
      - "8081:80"
    volumes:
      - target_nginx_logs:/var/log/nginx
      - target_flask_logs:/app/logs
      - target_ossec:/var/ossec
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 12 http://localhost:80/ >/dev/null"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - attense_net

  # ── Manager: Wazuh Manager ──────────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.2
    container_name: attense_wazuh_manager
    hostname: wazuh.manager
    restart: unless-stopped
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_manager_etc:/var/ossec/etc
      - wazuh_manager_queue:/var/ossec/queue
      - wazuh_alerts:/var/ossec/logs/alerts
      - ./wazuh/active-response/bin:/var/ossec/active-response/bin:rw
      - ./wazuh/active-response/logs:/var/ossec/active-response/logs:rw
    healthcheck:
      test: ["CMD-SHELL", "/var/ossec/bin/wazuh-control status | grep -q 'wazuh-authd is running'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - attense_net

  # ── Signal Store ────────────────────────────────────────────────────────────
  signal-store:
    build:
      context: ./signal-store
    container_name: attense_signal_store
    hostname: signal-store
    restart: unless-stopped
    depends_on:
      wazuh-manager:
        condition: service_healthy
    environment:
      WAZUH_ALERTS_PATH: /wazuh/alerts/alerts.json
      OUTPUT_MODE: both
      OUTPUT_PATH: /attense/data/mapped_events.jsonl
      EVENT_STORE_URL: "http://attense-app:8010/blueteam/raise-alert"
      INCIDENT_ID: "phase3-incident-001"
      MODE: wazuh
    volumes:
      - wazuh_alerts:/wazuh/alerts:ro
      - attense_ssd_volume:/attense/data
      - ./attense-app:/attense_app:ro
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - attense_net

  # ── Attense App ────────────────────────────────────────────────────────────────────────────────
  attense-app:
    build:
      context: ./attense-app
    container_name: attense_app
    hostname: attense-app
    restart: unless-stopped
    depends_on:
      - signal-store
      - thehive
    environment:
      ATTENSE_DATA_PATH: /attense/data/mapped_events.jsonl
      # TheHive integration
      HIVE_URL: "http://thehive:9000"
      # Real key for 'attense-analyst@thehive.local' goes in the root .env
      # file (gitignored) as HIVE_API_KEY — see secrets/ATTENSE.env's
      # conventions. The org/user didn't exist until this session, so this
      # was always a non-functional placeholder before.
      HIVE_API_KEY: "${HIVE_API_KEY:-changeme}"
      # Blue Team webhook secret (placeholder for future HMAC validation; same
      # name/value as secrets/ATTENSE.env's WEBHOOK_SECRET and the Dockerfile).
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-changeme-webhook}"
      # Sandbox / Target Agent
      SANDBOX_URL: "http://target-agent:80"
      # NOTE: VIRUSTOTAL_API_KEY / ABUSEIPDB_API_KEY are NOT set here on purpose —
      # they come from the env_file below (secrets/enrichment.env). A value in
      # `environment:` would override env_file, so leaving them out lets the real
      # keys through. Missing/empty keys still disable enrichment gracefully.
    env_file:
      - ./secrets/enrichment.env
    volumes:
      - attense_ssd_volume:/attense/data:ro
      - ./attense-app:/app
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8010/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - attense_net

  # ── AttackBox: Lightweight local pen-test tools ─────────────────────────────
  attackbox:
    build:
      context: ./attackbox
    container_name: attense-attackbox
    hostname: attackbox
    restart: unless-stopped
    command: sleep infinity
    depends_on:
      - target-agent
    networks:
      - attense_net

  # ── OWASP ZAP: Local proxy ─────────────────────────────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: attense_zap
    hostname: zap
    restart: unless-stopped
    # -silent skips the on-boot add-on auto-update (which otherwise downloads
    # ~13 addons and pushes API readiness from ~30s to ~4min, leaving the
    # frontend ZAP panel stuck on "offline").
    command: >
      zap.sh -daemon -silent -host 0.0.0.0 -port 8080
      -config api.key=attense-lab-key
      -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
      -config connection.timeoutInSecs=20
    depends_on:
      - target-agent
    networks:
      - attense_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://127.0.0.1:8080/JSON/core/view/version/?apikey=attense-lab-key' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ── Ollama: Local LLM inference ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: attense_ollama
    hostname: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - attense_net

  # ── Red Team Backend: FastAPI ───────────────────────────────────────────────
  red-team-backend:
    build:
      context: ./red-team
    container_name: attense_red_team_backend
    hostname: red-team-backend
    restart: unless-stopped
    depends_on:
      - target-agent
      - attackbox
      - ollama
    environment:
      TARGET_HOST: target-agent
      TARGET_PORT: "80"
      LOG_DIR: /red-team/logs
      ATTACKBOX_CONTAINER: attense-attackbox
      ZAP_API_URL: "http://zap:8080"
      ZAP_API_KEY: "attense-lab-key"
      OLLAMA_URL: "http://ollama:11434"
    volumes:
      - red_team_logs:/red-team/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8000:8000"
    networks:
      - attense_net

  # ── Red Team Frontend: React + Vite ─────────────────────────────────────────
  red-team-frontend:
    build:
      context: ./red-team/frontend
    container_name: attense_red_team_frontend
    hostname: red-team-frontend
    restart: unless-stopped
    depends_on:
      - red-team-backend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/frontend-health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - attense_net

  # Blue Team endpoints now provided by `attense-app` (no separate service)

  # ── Cassandra: TheHive Database ─────────────────────────────────────────────
  cassandra:
    image: cassandra:3.11
    container_name: attense_cassandra
    hostname: cassandra
    restart: unless-stopped
    command: >
      bash -lc "sed -ri
      -e 's/^read_request_timeout_in_ms:.*/read_request_timeout_in_ms: 20000/'
      -e 's/^range_request_timeout_in_ms:.*/range_request_timeout_in_ms: 20000/'
      -e 's/^write_request_timeout_in_ms:.*/write_request_timeout_in_ms: 20000/'
      -e 's/^counter_write_request_timeout_in_ms:.*/counter_write_request_timeout_in_ms: 20000/'
      -e 's/^request_timeout_in_ms:.*/request_timeout_in_ms: 30000/'
      /etc/cassandra/cassandra.yaml
      && exec /usr/local/bin/docker-entrypoint.sh cassandra -f"
    environment:
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
      - CASSANDRA_CLUSTER_NAME=hive
      - CASSANDRA_READ_REQUEST_TIMEOUT_IN_MS=20000
      - CASSANDRA_RANGE_REQUEST_TIMEOUT_IN_MS=20000
      - CASSANDRA_WRITE_REQUEST_TIMEOUT_IN_MS=20000
      - CASSANDRA_COUNTER_WRITE_REQUEST_TIMEOUT_IN_MS=20000
      - CASSANDRA_REQUEST_TIMEOUT_IN_MS=30000
    volumes:
      - blueteam_cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh cassandra -e 'SELECT now() FROM system.local;' >/dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 20
      start_period: 120s
    networks:
      - attense_net

  # ── Elasticsearch: TheHive Indexer ──────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    container_name: attense_elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=hive
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=10000
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - blueteam_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - attense_net

  # ── TheHive: Case Management UI ─────────────────────────────────────────────
  thehive:
    image: thehiveproject/thehive4:4.1.24-1
    container_name: attense_thehive
    hostname: thehive
    restart: unless-stopped
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
      # Bearer secret TheHive signs webhooks with — must equal attense-app's
      # WEBHOOK_SECRET. application.conf reads it via ${?WEBHOOK_SECRET}.
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-changeme-webhook}
    command: >
      --secret "attense-super-secret-key-that-is-at-least-64-bytes-long-for-thehive-so-it-starts"
      --cql-hostnames cassandra
    volumes:
      - ./thehive/application.conf:/etc/thehive/application.conf
    ports:
      - "9000:9000"
    networks:
      - attense_net

  # TheHive Init: creates the Blue Team organisation/user and API key.
  thehive-init:
    image: python:3.11-slim
    container_name: attense_thehive_init
    restart: "no"
    depends_on:
      thehive:
        condition: service_started
    environment:
      - THEHIVE_URL=http://thehive:9000
      - THEHIVE_ORG_NAME=blue-team
      - THEHIVE_WEBHOOK_ENDPOINT=blueteam
    volumes:
      - ./scripts:/scripts:ro
    command: python /scripts/setup_thehive.py
    networks:
      - attense_net


  # ── Cortex: Active-Response Engine (Responders for TheHive) ─────────────────
  cortex:
    image: thehiveproject/cortex:3.1.7-1
    container_name: attense_cortex
    hostname: cortex
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
      - CORTEX_PLAY_SECRET=${CORTEX_PLAY_SECRET:-5f6e69909a9ca4768d36c3f418a9a6e0857a0eac393d18071291f0971abc7e80f3dd02112b7f4505ae8f17eb8500aa61}
    volumes:
      - ./cortex/application.conf:/etc/cortex/application.conf
      - ./cortex/responders:/opt/cortex/responders
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9001:9001"
    healthcheck:
      # Cortex is ready when /api/status returns HTTP 200
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/api/status', timeout=5)\" 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - attense_net

  # ── Cortex Init: One-shot bootstrap (runs once, wires Cortex → TheHive) ─────
  # Waits for Cortex to be healthy, then runs setup_cortex.py which:
  #   1. Creates the admin user + ATTENSE org in Cortex
  #   2. Generates an API key for the org
  #   3. Enables the WazuhBlockIP responder
  #   4. Patches thehive/application.conf with the real key
  #   5. Restarts TheHive via Docker socket so it picks up the new key
  #   6. Deletes secrets/ATTENSE.env from disk
  cortex-init:
    image: python:3.11-slim
    container_name: attense_cortex_init
    restart: "no"
    depends_on:
      cortex:
        condition: service_healthy
    environment:
      - CORTEX_URL=http://cortex:9001
      - THEHIVE_CONF_PATH=/thehive/application.conf
      - CORTEX_ORG_NAME=ATTENSE
      - CORTEX_PLAY_SECRET=${CORTEX_PLAY_SECRET:-5f6e69909a9ca4768d36c3f418a9a6e0857a0eac393d18071291f0971abc7e80f3dd02112b7f4505ae8f17eb8500aa61}
    volumes:
      - ./scripts:/scripts:ro          # setup_cortex.py lives here
      - ./thehive:/thehive             # script patches application.conf here
      - ./secrets:/secrets             # reads ATTENSE.env then deletes it
      - /var/run/docker.sock:/var/run/docker.sock   # to restart TheHive
    command: python /scripts/setup_cortex.py
    networks:
      - attense_net

  # ── Wazuh Init: One-shot fixups (runs once, fixes manager state) ────────────
  # The manager's /var/ossec/etc lives in the wazuh_manager_etc named volume,
  # not a repo-tracked file, so these fixes don't survive a fresh volume on
  # their own. Waits for wazuh-manager to be healthy, then runs
  # setup_wazuh.py which:
  #   1. Fixes log directory ownership (root -> wazuh) so wazuh-analysisd
  #      doesn't crash-loop on permission errors.
  #   2. Adds active-response command bindings (firewall-drop, route-null,
  #      disable-account) to ossec.conf.
  #   3. Restarts Wazuh daemons if anything changed.
  wazuh-init:
    image: python:3.11-slim
    container_name: attense_wazuh_init
    restart: "no"
    depends_on:
      wazuh-manager:
        condition: service_healthy
    environment:
      - WAZUH_CONTAINER=attense_wazuh_manager
    volumes:
      - ./scripts:/scripts:ro          # setup_wazuh.py lives here
      - /var/run/docker.sock:/var/run/docker.sock   # to exec into wazuh-manager
    command: python /scripts/setup_wazuh.py
    networks:
      - attense_net

  # Wazuh Agent Watchdog: keeps the disposable target-agent enrolled.
  # If the manager has a disconnected target-agent record that blocks fresh
  # enrollment, this service removes the stale record and restarts the target.
  wazuh-agent-watchdog:
    image: python:3.11-slim
    container_name: attense_wazuh_agent_watchdog
    restart: unless-stopped
    depends_on:
      wazuh-manager:
        condition: service_healthy
      target-agent:
        condition: service_started
    environment:
      - WAZUH_CONTAINER=attense_wazuh_manager
      - TARGET_CONTAINER=attense_target_agent
      - TARGET_AGENT_NAME=target-agent
      - CHECK_INTERVAL_SECONDS=30
      - STALE_AFTER_MISSES=2
    volumes:
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: python /scripts/wazuh_agent_watchdog.py
    networks:
      - attense_net

  # ── Attense React ───────────────────────────────────────────────────────────
  attense-react:
    build:
      context: ./AttenseFront/attense-react
    container_name: attense_react
    hostname: attense-react
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./AttenseFront/attense-react/src:/app/src
      - ./AttenseFront/attense-react/public:/app/public
      - ./AttenseFront/attense-react/index.html:/app/index.html
    networks:
      - attense_net

networks:
  attense_net:
    driver: bridge

volumes:
  target_nginx_logs:
  target_flask_logs:
  target_ossec:
  wazuh_manager_etc:
  wazuh_manager_queue:
  wazuh_alerts:
  attense_ssd_volume:
  red_team_logs:
  ollama_data:
  # BlueTeam internal storage — Cassandra and Elasticsearch run inside the blueteam container
  blueteam_cassandra_data:
  blueteam_elasticsearch_data:
