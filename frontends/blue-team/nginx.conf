server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Required so the proxy_pass directives below can
    # re-resolve the attense-app container at request time (via a variable)
    # instead of caching a single IP at nginx startup. Without this, a
    # recreated attense-app gets a new IP and every proxied request 502s
    # until nginx is manually reloaded.
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /frontend-health {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        set                $app_api "attense-app:8020";
        proxy_pass         http://$app_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /blueteam/ {
        set                $app_bt "attense-app:8010";
        proxy_pass         http://$app_bt;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|ico|webp|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
