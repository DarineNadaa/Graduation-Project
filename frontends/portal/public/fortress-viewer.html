<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
  var W = window.innerWidth, H = window.innerHeight;

  var R = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  R.setSize(W, H);
  R.setPixelRatio(Math.min(devicePixelRatio, 2));
  R.setClearColor(0x000000, 0);
  R.outputEncoding = THREE.sRGBEncoding;
  R.toneMapping = THREE.ACESFilmicToneMapping;
  R.toneMappingExposure = 0.85;
  R.shadowMap.enabled = true;
  document.body.appendChild(R.domElement);

  var scene = new THREE.Scene();
  scene.background = null;

  var camera = new THREE.PerspectiveCamera(52, W/H, 0.1, 100);
  camera.position.set(0, 1.5, 15);
  camera.lookAt(0, 0, 0);

  window.addEventListener('resize', function(){
    W = window.innerWidth; H = window.innerHeight;
    R.setSize(W, H);
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
  });

  // Lights
  scene.add(new THREE.AmbientLight(0x0d1530, 0.6));

  var key = new THREE.DirectionalLight(0x5577cc, 1.8);
  key.position.set(-4, 10, 6);
  key.castShadow = true;
  scene.add(key);

  var fill = new THREE.DirectionalLight(0x1133aa, 0.4);
  fill.position.set(6, 2, -4);
  scene.add(fill);

  var purple = new THREE.PointLight(0xcc33ff, 5, 16);
  purple.position.set(0, 3, 0);
  scene.add(purple);

  var cyan = new THREE.PointLight(0x00ffee, 3, 14);
  cyan.position.set(2, 2, 4);
  scene.add(cyan);

  var red = new THREE.PointLight(0xff1133, 2.5, 10);
  red.position.set(-3, 1, 3);
  scene.add(red);

  // Particles
  var pN = 90;
  var pPos = new Float32Array(pN * 3);
  var pSpd = new Float32Array(pN);
  for (var i = 0; i < pN; i++) {
    var a = Math.random() * Math.PI * 2;
    var r = 3.5 + Math.random() * 3;
    pPos[i*3]   = Math.cos(a) * r;
    pPos[i*3+1] = (Math.random() - 0.5) * 6;
    pPos[i*3+2] = Math.sin(a) * r;
    pSpd[i] = (Math.random() - 0.5) * 0.008;
  }
  var pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0x44ffee, size: 0.06,
    transparent: true, opacity: 0.65,
    blending: THREE.AdditiveBlending, depthWrite: false
  })));

  // Ground shadow catcher
  var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.ShadowMaterial({ opacity: 0.2 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.5;
  ground.receiveShadow = true;
  scene.add(ground);

  // Load GLB
  var fort = null;
  var loader = new THREE.GLTFLoader();
  loader.load('assets/fortress.glb', function(gltf){
    fort = gltf.scene;

    // Centre + fit
    var box = new THREE.Box3().setFromObject(fort);
    var ctr = box.getCenter(new THREE.Vector3());
    fort.position.sub(ctr);
    var sz = box.getSize(new THREE.Vector3()).length();
    fort.scale.setScalar(9.5 / sz);

    // Boost emissive materials
    fort.traverse(function(child){
      if (!child.isMesh) return;
      child.castShadow = true;
      var mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(function(m){
        if (m.emissive) m.emissiveIntensity = Math.max((m.emissiveIntensity||0), 0.3) + 0.5;
        m.needsUpdate = true;
      });
    });

    scene.add(fort);
    window.__fortLoaded = true;
  }, undefined, function(err){
    console.error('GLB load error:', err);
    window.__fortError = String(err);
  });

  // Animate
  var t = 0;
  (function anim(){
    requestAnimationFrame(anim);
    t += 0.008;

    if (fort) {
      fort.rotation.y = t * 0.22;
      fort.position.y = Math.sin(t * 0.7) * 0.18;
    }

    purple.intensity = 7 + Math.sin(t * 2.1) * 2.5;
    cyan.intensity   = 4 + Math.sin(t * 1.7 + 1) * 1.8;
    red.intensity    = 3 + Math.sin(t * 3.1) * 1.2;

    camera.position.y = 1.5 + Math.sin(t * 0.28) * 0.15;
    camera.lookAt(0, 0, 0);

    for (var p = 0; p < pN; p++) {
      pPos[p*3+1] += pSpd[p];
      if (pPos[p*3+1] >  3) pPos[p*3+1] = -3;
      if (pPos[p*3+1] < -3) pPos[p*3+1] =  3;
    }
    pGeo.attributes.position.needsUpdate = true;
    R.render(scene, camera);
  })();
})();
</script>
</body>
</html>
