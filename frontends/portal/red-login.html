<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #0a0203; }

  .pb { outline: none; cursor: pointer; border: 0; position: relative; border-radius: 100px; background-color: #150304; transition: box-shadow .2s ease, transform .2s ease; text-decoration: none; display: inline-flex; box-shadow: inset 0 .2rem .5rem rgba(255,255,255,.08), inset 0 -.1rem .2rem rgba(0,0,0,.8), inset 0 -.3rem .6rem rgba(255,255,255,.07), 0 2rem 2rem rgba(0,0,0,.25), 0 .5rem .8rem -.4rem rgba(0,0,0,.7); }
  .pb-wrap { font-family: Inter,sans-serif; font-size: 14px; font-weight: 600; color: rgba(140,180,210,.7); padding: 0 28px; height: 48px; border-radius: 100px; position: relative; overflow: hidden; white-space: nowrap; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
  .pb:hover { box-shadow: inset 0 .2rem .4rem rgba(100,160,200,.14), inset 0 -.1rem .2rem rgba(0,0,0,.8), inset 0 -.3rem .6rem rgba(64,130,180,.18), 0 2rem 2rem rgba(0,0,0,.25), 0 .5rem .8rem -.4rem rgba(0,0,0,.7); }
  .pb:active { transform: translateY(3px); }

  .inp { width: 100%; height: 46px; padding: 0 16px; background: #171b28; border: 1px solid rgba(255,255,255,.1); border-radius: 10px; color: #f7f8ff; font-size: 14px; font-family: inherit; outline: none; transition: border-color .18s, box-shadow .18s; }
  .inp:focus { border-color: rgba(192,39,61,.6); box-shadow: 0 0 0 3px rgba(192,39,61,.1); }
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus { -webkit-box-shadow: 0 0 0 1000px #171b28 inset !important; -webkit-text-fill-color: #f7f8ff !important; }

  .team-tab { height: 34px; padding: 0 14px; border-radius: 8px; border: none; background: none; color: #9ca3b7; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, color .15s; flex: 1; }
  .team-tab.active { background: rgba(192,39,61,.12); color: #ff8a9a; }

  .gc { position: relative; overflow: hidden; border-radius: 14px; padding: 14px 16px; background: linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01)); border: 1px solid rgba(255,255,255,.08); cursor: pointer; transition: border-color .18s, background .18s; }
  .gc.selected { border-color: rgba(192,39,61,.5); background: rgba(192,39,61,.07); }
  .gc:hover:not(.selected) { border-color: rgba(255,255,255,.16); background: rgba(255,255,255,.03); }
  .gc-ray { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 110%; height: 50px; border-radius: 50%; pointer-events: none; }
  .gc-dot { position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; border-radius: 50%; }
  .bl { position: absolute; overflow: hidden; }
  .bl::after { content: ''; position: absolute; }
  .gc .topl { top:0;left:0;width:100%;height:1px; }
  .gc .bottoml { bottom:0;left:0;width:100%;height:1px; }
  .gc .leftl { top:0;left:0;width:1px;height:100%; }
  .gc .rightl { top:0;right:0;width:1px;height:100%; }
  .gc .topl::after,.gc .bottoml::after { width:40%;height:100%; }
  .gc .leftl::after,.gc .rightl::after { width:100%;height:40%; }
  .gc-v .topl::after,.gc-v .bottoml::after { background:linear-gradient(90deg,transparent,rgba(192,39,61,.85),transparent);animation:br 3s ease-in-out infinite; }
  .gc-v .leftl::after,.gc-v .rightl::after { background:linear-gradient(180deg,transparent,rgba(192,39,61,.85),transparent);animation:bd 3s ease-in-out infinite .75s; }
  .gc-b .topl::after,.gc-b .bottoml::after { background:linear-gradient(90deg,transparent,rgba(229,57,53,.85),transparent);animation:br 3s ease-in-out infinite .8s; }
  .gc-b .leftl::after,.gc-b .rightl::after { background:linear-gradient(180deg,transparent,rgba(229,57,53,.85),transparent);animation:bd 3s ease-in-out infinite 1.5s; }
  .gc-g .topl::after,.gc-g .bottoml::after { background:linear-gradient(90deg,transparent,rgba(67,211,159,.85),transparent);animation:br 3s ease-in-out infinite 1.2s; }
  .gc-g .leftl::after,.gc-g .rightl::after { background:linear-gradient(180deg,transparent,rgba(67,211,159,.85),transparent);animation:bd 3s ease-in-out infinite 1.9s; }
  .gc-r .topl::after,.gc-r .bottoml::after { background:linear-gradient(90deg,transparent,rgba(229,57,53,.85),transparent);animation:br 3s ease-in-out infinite .4s; }
  .gc-r .leftl::after,.gc-r .rightl::after { background:linear-gradient(180deg,transparent,rgba(229,57,53,.85),transparent);animation:bd 3s ease-in-out infinite 1.1s; }

  @keyframes br { 0%,100%{transform:translateX(-110%)} 50%{transform:translateX(310%)} }
  @keyframes bd { 0%,100%{transform:translateY(-110%)} 50%{transform:translateY(310%)} }
  @keyframes slide-up { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
  @keyframes panel-in { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
  @keyframes progress-fill { from{width:0%} to{width:100%} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(67,211,159,.7)} 70%{box-shadow:0 0 0 7px rgba(67,211,159,0)} }
  @keyframes pulse-blue { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,.7)} 70%{box-shadow:0 0 0 7px rgba(255,107,107,0)} }
  @keyframes row-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  @media(max-width:820px) { #at-left { display: none !important; } }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function ParticleCanvas({ id }) {
  const rafRef = useRef(null);
  useEffect(() => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 130, H = canvas.offsetHeight || 28;
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
    const fs = Math.min(22, H * .75);
    ctx.font = `900 ${fs}px Inter,sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
    ctx.fillText('ATTENSE', W/2, H/2);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height); ctx.clearRect(0,0,W,H);
    const pts = []; const step = Math.max(2, Math.round(4 * dpr)); const cw = canvas.width;
    for (let y = 0; y < canvas.height; y += step)
      for (let x = 0; x < canvas.width; x += step)
        if (img.data[(y * cw + x) * 4 + 3] > 128) {
          const ox = x/dpr, oy = y/dpr;
          const t = x/canvas.width;
          const stops = [[0,[255,59,59]],[.28,[229,57,53]],[.52,[168,85,247]],[.74,[74,134,232]],[1,[29,111,232]]];
          let i = 0; while (i < stops.length-1 && stops[i+1][0] <= t) i++;
          const [t0,c0] = stops[i], [t1,c1] = stops[Math.min(i+1,stops.length-1)];
          const f = t1===t0 ? 0 : Math.max(0,Math.min(1,(t-t0)/(t1-t0)));
          const color = `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*f)},${Math.round(c0[1]+(c1[1]-c0[1])*f)},${Math.round(c0[2]+(c1[2]-c0[2])*f)})`;
          pts.push({ x: ox, y: oy, ox, oy, vx: (Math.random()-.5)*2, vy: (Math.random()-.5)*2, color });
        }
    let mx = -1000, my = -1000;
    canvas.onmousemove = e => { const r = canvas.getBoundingClientRect(); mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height); };
    canvas.onmouseleave = () => { mx=-1000; my=-1000; };
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      for (const p of pts) {
        const dx=mx-p.x, dy=my-p.y, d=Math.sqrt(dx*dx+dy*dy);
        if (d < 70 && mx > 0) { const f=(70-d)/70; p.vx-=(dx/d)*f*9; p.vy-=(dy/d)*f*9; }
        p.vx+=(p.ox-p.x)*.08; p.vy+=(p.oy-p.y)*.08; p.vx*=.85; p.vy*=.85; p.x+=p.vx; p.y+=p.vy;
        ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,1.2,0,Math.PI*2); ctx.fill();
      }
      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [id]);
  return <canvas id={id} style={{display:'block',height:'28px',width:'130px',touchAction:'none'}} />;
}

function Spinner() {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{animation:'spin .7s linear infinite'}}><path d="M12 2a10 10 0 0 1 10 10"/></svg>;
}

function GlowCard({ type, selected, onClick, icon, title, sub }) {
  return (
    <div className={`gc gc-${type}${selected?' selected':''}`} onClick={onClick}>
      <div className="gc-ray" style={{background:`radial-gradient(ellipse at 50% 0%,${
        type==='r'?'rgba(229,57,53,.18)':type==='b'?'rgba(229,57,53,.18)':type==='v'?'rgba(192,39,61,.18)':'rgba(67,211,159,.15)'
      },transparent 70%)`}}></div>
      <div className="gc-dot" style={{background:
        type==='r'?'#ef5350':type==='b'?'#e53935':type==='v'?'#c0273d':'#43d39f',
        boxShadow:`0 0 10px 3px ${type==='r'?'rgba(229,57,53,.5)':type==='b'?'rgba(229,57,53,.5)':type==='v'?'rgba(192,39,61,.5)':'rgba(67,211,159,.5)'}`
      }}></div>
      <div className="bl topl"></div><div className="bl leftl"></div><div className="bl bottoml"></div><div className="bl rightl"></div>
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px'}}>
        <div style={{width:'28px',height:'28px',borderRadius:'7px',
          background:`${type==='r'?'rgba(229,57,53,.1)':type==='b'?'rgba(229,57,53,.1)':type==='v'?'rgba(192,39,61,.1)':'rgba(67,211,159,.1)'}`,
          border:`1px solid ${type==='r'?'rgba(229,57,53,.22)':type==='b'?'rgba(229,57,53,.22)':type==='v'?'rgba(192,39,61,.22)':'rgba(67,211,159,.2)'}`,
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          {icon}
        </div>
        <div>
          <div style={{fontSize:'12px',fontWeight:'700',color:'#f7f8ff'}}>{title}</div>
          <div style={{fontSize:'11px',color:'#9ca3b7'}}>{sub}</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [rememberMe, setRememberMe] = useState(false);
  const [otp, setOtp] = useState(['','','','','','']);
  const [role, setRole] = useState('');
  const [teamMode, setTeamMode] = useState('join');
  const [teamCode, setTeamCode] = useState('');
  const [teamName, setTeamName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const dotColor = (n) => step >= n ? 'rgba(192,39,61,.8)' : 'rgba(255,255,255,.15)';

  const handleContinue = () => {
    if (!email.trim()) { setError('Please enter your email.'); return; }
    if (!password) { setError('Please enter your password.'); return; }
    setLoading(true); setError('');
    setTimeout(() => { setLoading(false); setStep(2); }, 900);
  };

  const handleOtp = (e) => {
    const idx = parseInt(e.target.dataset.idx, 10);
    const val = e.target.value.replace(/[^0-9]/g,'').slice(-1);
    const next = [...otp]; next[idx] = val; setOtp(next);
    if (val && idx < 5) { const n = document.querySelector(`[data-idx="${idx+1}"]`); if (n) n.focus(); }
  };

  const handleOtpKey = (e) => {
    const idx = parseInt(e.target.dataset.idx, 10);
    if (e.key === 'Backspace' && !otp[idx] && idx > 0) {
      const p = document.querySelector(`[data-idx="${idx-1}"]`);
      if (p) { const next=[...otp]; next[idx-1]=''; setOtp(next); setTimeout(()=>p.focus(),0); }
    }
  };

  const handleVerify = () => {
    if (otp.join('').length < 6) { setError('Please enter the complete 6-digit code.'); return; }
    setLoading(true); setError('');
    setTimeout(() => { setLoading(false); setStep(3); }, 1000);
  };

  const handleRoleSubmit = () => {
    if (!role) { setError('Please select your role.'); return; }
    if (teamMode==='join' && !teamCode.trim()) { setError('Please enter a team code.'); return; }
    if (teamMode==='create' && !teamName.trim()) { setError('Please enter a team name.'); return; }
    setLoading(true); setError('');
    setTimeout(() => { setLoading(false); setStep(4); }, 1000);
  };

  const ErrorBox = () => error ? (
    <div style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'12px 15px',borderRadius:'10px',background:'rgba(255,105,120,.08)',border:'1px solid rgba(255,105,120,.24)',color:'#ff8a94',fontSize:'13px',marginBottom:'16px',lineHeight:'1.55'}}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{flexShrink:0,marginTop:'1px'}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {error}
    </div>
  ) : null;

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'radial-gradient(ellipse at 22% -8%,rgba(200,39,61,.26) 0%,transparent 52%),linear-gradient(160deg,#0a0203 0%,#07080c 100%)',color:'#f7f8ff',position:'relative'}}>
      {/* BACK BUTTON */}
      <a href="red-home.html" style={{position:'fixed',top:'20px',left:'24px',zIndex:100,display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'12px',fontWeight:600,color:'rgba(140,180,255,.55)',textDecoration:'none',letterSpacing:'.06em',textTransform:'uppercase',transition:'color .2s',fontFamily:'Inter,sans-serif'}}
        onMouseOver={e=>e.currentTarget.style.color='rgba(140,180,255,1)'}
        onMouseOut={e=>e.currentTarget.style.color='rgba(140,180,255,.55)'}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Red Team
      </a>

      {/* LEFT PANEL */}
      <div id="at-left" style={{display:'flex',flexDirection:'column',justifyContent:'space-between',width:'44%',minHeight:'100vh',padding:'52px 48px',background:'radial-gradient(circle at 80% 90%,rgba(255,107,107,.05) 0%,transparent 60%),radial-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(180deg,rgba(13,3,5,.97) 0%,rgba(10,2,3,.97) 100%)',backgroundSize:'100% 100%,26px 26px,100% 100%',borderRight:'1px solid rgba(255,255,255,.07)',position:'relative',overflow:'hidden',animation:'panel-in .65s cubic-bezier(.22,1,.36,1) both'}}>
        <div style={{position:'absolute',top:'-60px',left:'-80px',width:'320px',height:'320px',background:'radial-gradient(circle,rgba(192,39,61,.08) 0%,transparent 70%)',pointerEvents:'none'}}></div>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'48px'}}>
            <img src="assets/ATTENSELOGO.png" style={{width:'42px',height:'42px',objectFit:'contain',mixBlendMode:'screen',filter:'drop-shadow(0 0 12px rgba(255,107,107,.5)) drop-shadow(0 0 24px rgba(192,39,61,.3))',flexShrink:0}} alt="" />
            <ParticleCanvas id="nav-canvas" />
          </div>
          <h2 style={{fontSize:'clamp(24px,2.4vw,34px)',fontWeight:'800',lineHeight:'1.08',letterSpacing:'-.025em',margin:'0 0 14px',maxWidth:'340px'}}>Join or create a team.</h2>
          <p style={{color:'#9ca3b7',fontSize:'14px',lineHeight:'1.72',margin:'0 0 24px',maxWidth:'310px'}}>Sign in, pick your role, and get into your operations center.</p>
          <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            {[
              {n:1,col:'rgba(192,39,61',text:'Sign in or create an account'},
              {n:2,col:'rgba(229,57,53',text:'Select your role — CISO, Analyst, IR Lead, or Threat Hunter'},
              {n:3,col:'rgba(67,211,159',text:'Join a team with a code, or create your own'},
            ].map(({n,col,text}) => (
              <div key={n} style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
                <div style={{width:'22px',height:'22px',borderRadius:'50%',background:`${col},.15)`,border:`1px solid ${col},.3)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',color:`${col},1)`,flexShrink:0}}>{n}</div>
                <div style={{fontSize:'13px',color:'#9ca3b7',paddingTop:'2px'}}>{text}</div>
              </div>
            ))}
          </div>
        </div>
        {/* Status card */}
        <div style={{border:'1px solid rgba(255,255,255,.09)',borderRadius:'18px',overflow:'hidden',background:'rgba(255,255,255,.025)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
              <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'#43d39f',animation:'pulse-green 2s infinite',display:'block'}}></span>
              <span style={{fontSize:'11px',fontWeight:'700',color:'#43d39f',letterSpacing:'.07em',textTransform:'uppercase'}}>System Live</span>
            </div>
            <span style={{fontSize:'11px',color:'#6f7689'}}>Jun 26 · Live</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)'}}>
            {[{v:'0',c:'#43d39f',l:'Active\nIncidents'},{v:'3',c:'#ff6b6b',l:'Threats\nMonitored'},{v:'8',c:'#ff8a9a',l:'Analysts\nOnline'}].map(({v,c,l},i) => (
              <div key={i} style={{padding:'14px',borderRight:i<2?'1px solid rgba(255,255,255,.07)':'none'}}>
                <div style={{fontSize:'24px',fontWeight:'800',color:c,lineHeight:'1',marginBottom:'3px'}}>{v}</div>
                <div style={{fontSize:'11px',color:'#6f7689',whiteSpace:'pre-line'}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* RIGHT PANEL */}
      <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:'100vh'}}>
        <div style={{padding:'24px 32px 0',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <a href="red-home.html" style={{display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'#6f7689',textDecoration:'none',fontWeight:'500'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            Red Team
          </a>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            {[1,2,3].map(n => <div key={n} style={{width:'8px',height:'8px',borderRadius:'50%',background:dotColor(n),transition:'background .3s'}}></div>)}
          </div>
        </div>

        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'28px 32px 24px'}}>
          <div style={{width:'100%',maxWidth:'420px'}}>

            {/* STEP 1 */}
            {step === 1 && (
              <div style={{animation:'slide-up .52s cubic-bezier(.22,1,.36,1) both'}}>
                <div style={{marginBottom:'28px'}}>
                  <h1 style={{fontSize:'26px',fontWeight:'800',letterSpacing:'-.025em',margin:'0 0 8px',color:'#f7f8ff'}}>Sign in</h1>
                  <p style={{color:'#9ca3b7',fontSize:'14px',margin:'0',lineHeight:'1.65'}}>No company or manager needed — just your credentials.</p>
                </div>
                <ErrorBox />
                <div style={{marginBottom:'13px'}}>
                  <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#c8cde0',marginBottom:'7px'}}>Email</label>
                  <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@anywhere.com" className="inp" />
                </div>
                <div style={{marginBottom:'8px'}}>
                  <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#c8cde0',marginBottom:'7px'}}>Password</label>
                  <div style={{position:'relative'}}>
                    <input type={showPw?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Your password" className="inp" style={{paddingRight:'46px'}} />
                    <button onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:0,top:0,width:'46px',height:'46px',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#6f7689'}}>
                      {showPw
                        ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      }
                    </button>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'22px'}}>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}}>
                    <input type="checkbox" checked={rememberMe} onChange={e=>setRememberMe(e.target.checked)} style={{accentColor:'#c0273d',width:'14px',height:'14px'}} />
                    <span style={{fontSize:'13px',color:'#9ca3b7'}}>Keep me signed in</span>
                  </label>
                  <a href="#" style={{fontSize:'13px',color:'#c0273d',textDecoration:'none',fontWeight:'500'}}>Forgot password?</a>
                </div>
                <button className="pb" style={{width:'100%'}} onClick={handleContinue}>
                  <div className="pb-wrap">{loading && <Spinner />}<span>✧</span>{loading?'Signing in…':'Continue →'}</div>
                </button>
                <p style={{textAlign:'center',color:'#6f7689',fontSize:'13px',margin:'20px 0 0'}}>New here? <a href="red-register.html" style={{color:'#c0273d',textDecoration:'none',fontWeight:'600'}}>Create a free account</a></p>
              </div>
            )}

            {/* STEP 2 — 2FA */}
            {step === 2 && (
              <div style={{animation:'slide-up .45s cubic-bezier(.22,1,.36,1) both'}}>
                <div style={{marginBottom:'26px'}}>
                  <div style={{width:'50px',height:'50px',borderRadius:'13px',background:'rgba(192,39,61,.12)',border:'1px solid rgba(192,39,61,.26)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'16px'}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c0273d" strokeWidth="1.8" strokeLinecap="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                  </div>
                  <h1 style={{fontSize:'24px',fontWeight:'800',letterSpacing:'-.025em',margin:'0 0 8px',color:'#f7f8ff'}}>Two-factor verification</h1>
                  <p style={{color:'#9ca3b7',fontSize:'14px',margin:'0',lineHeight:'1.65'}}>Enter the 6-digit code from your authenticator app.</p>
                </div>
                <ErrorBox />
                <div style={{display:'flex',gap:'8px',marginBottom:'24px',justifyContent:'center'}}>
                  {otp.map((v, i) => (
                    <React.Fragment key={i}>
                      {i === 3 && <div style={{display:'flex',alignItems:'center',color:'rgba(255,255,255,.18)',fontSize:'16px'}}>·</div>}
                      <input data-idx={i} value={v} onChange={handleOtp} onKeyDown={handleOtpKey} maxLength="1" inputMode="numeric" autoComplete="one-time-code"
                        style={{width:'50px',height:'58px',textAlign:'center',fontSize:'22px',fontWeight:'700',background:'#171b28',border:'1px solid rgba(255,255,255,.12)',borderRadius:'10px',color:'#f7f8ff',outline:'none',fontFamily:'inherit'}} />
                    </React.Fragment>
                  ))}
                </div>
                <button className="pb" style={{width:'100%'}} onClick={handleVerify}>
                  <div className="pb-wrap">{loading && <Spinner />}<span>✧</span>{loading?'Verifying…':'Verify & Continue →'}</div>
                </button>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'16px'}}>
                  <button onClick={()=>{setStep(1);setError('');setOtp(['','','','','','']);}} style={{background:'none',border:'none',color:'#6f7689',fontSize:'13px',cursor:'pointer',padding:'0',display:'flex',alignItems:'center',gap:'5px'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>Back
                  </button>
                  <a href="#" style={{fontSize:'13px',color:'#c0273d',textDecoration:'none',fontWeight:'500'}}>Resend code</a>
                </div>
              </div>
            )}

            {/* STEP 3 — Role + Team */}
            {step === 3 && (
              <div style={{animation:'slide-up .45s cubic-bezier(.22,1,.36,1) both'}}>
                <div style={{marginBottom:'20px'}}>
                  <h1 style={{fontSize:'24px',fontWeight:'800',letterSpacing:'-.025em',margin:'0 0 8px',color:'#f7f8ff'}}>Your role &amp; team</h1>
                  <div style={{display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 10px',borderRadius:'7px',background:'rgba(255,107,107,.08)',border:'1px solid rgba(255,107,107,.2)',color:'#ff6b6b',fontSize:'11px',fontWeight:'700'}}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Join or create a team
                  </div>
                </div>
                <ErrorBox />
                <div style={{marginBottom:'16px'}}>
                  <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#c8cde0',marginBottom:'9px'}}>Your role</label>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
                    <GlowCard type="r" selected={role==='ciso'} onClick={()=>{setRole('ciso');setError('');}}
                      icon={<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ef5350" strokeWidth="2" strokeLinecap="round"><path d="M12 2L3.5 6.5v6C3.5 17.9 7.3 22.1 12 23.5c4.7-1.4 8.5-5.6 8.5-11V6.5L12 2z"/></svg>}
                      title="CISO" sub="Reports & oversight" />
                    <GlowCard type="b" selected={role==='soc'} onClick={()=>{setRole('soc');setError('');}}
                      icon={<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e53935" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4"/></svg>}
                      title="SOC Analyst" sub="Alert monitoring" />
                    <GlowCard type="v" selected={role==='ir'} onClick={()=>{setRole('ir');setError('');}}
                      icon={<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#c0273d" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>}
                      title="IR Lead" sub="Incident response" />
                    <GlowCard type="g" selected={role==='th'} onClick={()=>{setRole('th');setError('');}}
                      icon={<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#43d39f" strokeWidth="2" strokeLinecap="round"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/></svg>}
                      title="Threat Hunter" sub="Proactive detection" />
                  </div>
                </div>
                <div style={{marginBottom:'18px'}}>
                  <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#c8cde0',marginBottom:'8px'}}>Team</label>
                  <div style={{display:'flex',gap:'4px',padding:'4px',background:'rgba(255,255,255,.04)',borderRadius:'10px',border:'1px solid rgba(255,255,255,.07)',marginBottom:'10px'}}>
                    <button className={`team-tab${teamMode==='join'?' active':''}`} onClick={()=>setTeamMode('join')}>Join existing</button>
                    <button className={`team-tab${teamMode==='create'?' active':''}`} onClick={()=>setTeamMode('create')}>Create new</button>
                  </div>
                  {teamMode==='join'
                    ? <div style={{animation:'row-in .3s ease both'}}><input type="text" value={teamCode} onChange={e=>setTeamCode(e.target.value)} placeholder="Team code  (e.g. BT-7821)" className="inp" style={{height:'42px'}} /><p style={{fontSize:'12px',color:'#6f7689',margin:'6px 0 0'}}>Ask any team member for your team code — no manager approval needed.</p></div>
                    : <div style={{animation:'row-in .3s ease both'}}><input type="text" value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="Team name (e.g. Alpha Response Unit)" className="inp" style={{height:'42px'}} /><p style={{fontSize:'12px',color:'#6f7689',margin:'6px 0 0'}}>Anyone can create a team — instantly, with no affiliation required.</p></div>
                  }
                </div>
                <button className={`pb${role==='ciso'?' pb-purple':''}`} style={{width:'100%'}} onClick={handleRoleSubmit}>
                  <div className="pb-wrap">{loading && <Spinner />}<span>✧</span>{loading?'Entering…':role==='ciso'?'Open Reporting Dashboard →':'Enter Operations Center →'}</div>
                </button>
              </div>
            )}

            {/* STEP 4 — Success */}
            {step === 4 && (
              <div style={{textAlign:'center',animation:'slide-up .5s cubic-bezier(.22,1,.36,1) both'}}>
                <div style={{width:'72px',height:'72px',borderRadius:'50%',background:'rgba(67,211,159,.11)',border:'1px solid rgba(67,211,159,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#43d39f" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h1 style={{fontSize:'26px',fontWeight:'800',letterSpacing:'-.025em',margin:'0 0 10px',color:'#f7f8ff'}}>Access Granted</h1>
                <p style={{color:'#9ca3b7',fontSize:'14px',lineHeight:'1.7',margin:'0 0 26px',maxWidth:'300px',marginLeft:'auto',marginRight:'auto'}}>
                  {role==='ciso'?'Redirecting to your CISO reporting dashboard…':'Welcome. Redirecting to the operations center…'}
                </p>
                <div style={{height:'3px',borderRadius:'999px',background:'rgba(255,255,255,.07)',overflow:'hidden',marginBottom:'12px'}}>
                  <div style={{height:'100%',background:'linear-gradient(90deg,#c0273d,#ff6b6b)',borderRadius:'999px',animation:'progress-fill 1.8s cubic-bezier(.4,0,.2,1) forwards'}}></div>
                </div>
                <p style={{fontSize:'12px',color:'#6f7689'}}>
                  {role==='ciso'?'CISO · Reporting Dashboard':`${role||'Analyst'} · ${teamMode==='create'?teamName||'New Team':teamCode||'Team'}`}
                </p>
              </div>
            )}

          </div>
        </div>
        <div style={{padding:'0 32px 22px',textAlign:'center'}}>
          <p style={{fontSize:'12px',color:'#6f7689',margin:'0'}}>© 2026 Attense · Red Team Operations</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
