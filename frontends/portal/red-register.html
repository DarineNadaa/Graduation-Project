<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/ATTENSELOGO.png">
<link rel="shortcut icon" type="image/png" href="assets/ATTENSELOGO.png">
<link rel="apple-touch-icon" href="assets/ATTENSELOGO.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATTENSE — Join Red Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body { font-family: Inter, system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; background: #0d0305; }

  .pb{outline:none;cursor:pointer;border:0;position:relative;border-radius:100px;background-color:#150304;transition:box-shadow .2s,transform .2s;text-decoration:none;display:inline-flex;box-shadow:inset 0 .2rem .5rem rgba(255,255,255,.08),inset 0 -.1rem .2rem rgba(0,0,0,.8),inset 0 -.3rem .6rem rgba(255,255,255,.07),0 2rem 2rem rgba(0,0,0,.25),0 .5rem .8rem -.4rem rgba(0,0,0,.7);}
  .pb-wrap{font-family:Inter,sans-serif;font-size:14px;font-weight:600;color:rgba(140,180,210,.7);padding:0 28px;height:48px;border-radius:100px;position:relative;overflow:hidden;white-space:nowrap;display:flex;align-items:center;gap:8px;}
  .pb-wrap::before,.pb-wrap::after{content:"";position:absolute;transition:all .3s;}
  .pb-wrap::before{left:-15%;right:-15%;bottom:25%;top:-100%;border-radius:50%;background-color:rgba(64,130,180,.06);}
  .pb-wrap::after{left:6%;right:6%;top:12%;bottom:40%;border-radius:22px 22px 0 0;box-shadow:inset 0 8px 6px -8px rgba(100,160,200,.18);background:linear-gradient(180deg,rgba(64,130,180,.08) 0%,transparent 50%);}
  .pb:hover{box-shadow:inset 0 .2rem .4rem rgba(100,160,200,.14),inset 0 -.1rem .2rem rgba(0,0,0,.8),inset 0 -.3rem .6rem rgba(64,130,180,.18),0 2rem 2rem rgba(0,0,0,.25),0 .5rem .8rem -.4rem rgba(0,0,0,.7);}
  .pb:hover .pb-wrap::before{transform:translateY(-5%);}.pb:hover .pb-wrap::after{opacity:.5;transform:translateY(5%);}
  .pb:active{transform:translateY(3px);}

  .gc{position:relative;overflow:hidden;border-radius:12px;padding:12px 14px;background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:border-color .18s;}
  .gc.sel{border-color:rgba(192,39,61,.5)!important;background:rgba(192,39,61,.07);}
  .gc:hover:not(.sel){border-color:rgba(255,255,255,.18);}
  .gc-ray{position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:110%;height:46px;border-radius:50%;pointer-events:none;}
  .gc-dot{position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;}
  .bl{position:absolute;overflow:hidden;}.bl::after{content:'';position:absolute;}
  .gc .topl{top:0;left:0;width:100%;height:1px;}.gc .bottoml{bottom:0;left:0;width:100%;height:1px;}
  .gc .leftl{top:0;left:0;width:1px;height:100%;}.gc .rightl{top:0;right:0;width:1px;height:100%;}
  .gc .topl::after,.gc .bottoml::after{width:40%;height:100%;}
  .gc .leftl::after,.gc .rightl::after{width:100%;height:40%;}
  .gc-r .topl::after,.gc-r .bottoml::after{background:linear-gradient(90deg,transparent,rgba(229,57,53,.8),transparent);animation:br 3s ease-in-out infinite;}
  .gc-r .leftl::after,.gc-r .rightl::after{background:linear-gradient(180deg,transparent,rgba(229,57,53,.8),transparent);animation:bd 3s ease-in-out infinite .75s;}
  .gc-b .topl::after,.gc-b .bottoml::after{background:linear-gradient(90deg,transparent,rgba(229,57,53,.8),transparent);animation:br 3s ease-in-out infinite .5s;}
  .gc-b .leftl::after,.gc-b .rightl::after{background:linear-gradient(180deg,transparent,rgba(229,57,53,.8),transparent);animation:bd 3s ease-in-out infinite 1.2s;}
  .gc-v .topl::after,.gc-v .bottoml::after{background:linear-gradient(90deg,transparent,rgba(192,39,61,.8),transparent);animation:br 3s ease-in-out infinite 1s;}
  .gc-v .leftl::after,.gc-v .rightl::after{background:linear-gradient(180deg,transparent,rgba(192,39,61,.8),transparent);animation:bd 3s ease-in-out infinite 1.7s;}
  .gc-g .topl::after,.gc-g .bottoml::after{background:linear-gradient(90deg,transparent,rgba(67,211,159,.8),transparent);animation:br 3s ease-in-out infinite 1.5s;}
  .gc-g .leftl::after,.gc-g .rightl::after{background:linear-gradient(180deg,transparent,rgba(67,211,159,.8),transparent);animation:bd 3s ease-in-out infinite 2.2s;}
  @keyframes br{0%,100%{transform:translateX(-110%)}50%{transform:translateX(310%)}}
  @keyframes bd{0%,100%{transform:translateY(-110%)}50%{transform:translateY(310%)}}

  .inp{width:100%;height:44px;padding:0 14px;background:#171b28;border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#f7f8ff;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
  .inp:focus{border-color:rgba(192,39,61,.6);}
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px #171b28 inset!important;-webkit-text-fill-color:#f7f8ff!important;caret-color:#f7f8ff!important;}

  @keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes prog{from{width:0%}to{width:100%}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function ParticleCanvas({ id }) {
  const rafRef = useRef(null);
  useEffect(() => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth || 380, H = canvas.offsetHeight || 56;
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
    const fs = Math.min(44, W * 0.148);
    ctx.clearRect(0,0,W,H); ctx.font = `900 ${fs}px Inter,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText('ATTENSE', W/2, H/2);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    ctx.clearRect(0,0,W,H);
    const stops = [[0,[255,59,59]],[.28,[229,57,53]],[.52,[168,85,247]],[.74,[74,134,232]],[1,[29,111,232]]];
    function pColor(t) {
      let i=0; while(i<stops.length-1&&stops[i+1][0]<=t)i++;
      const[t0,c0]=stops[i],[t1,c1]=stops[Math.min(i+1,stops.length-1)];
      const f=t1===t0?0:Math.max(0,Math.min(1,(t-t0)/(t1-t0)));
      return `rgb(${Math.round(c0[0]+(c1[0]-c0[0])*f)},${Math.round(c0[1]+(c1[1]-c0[1])*f)},${Math.round(c0[2]+(c1[2]-c0[2])*f)})`;
    }
    const pts = []; const step = Math.max(3, Math.round(5*dpr)); const cw = canvas.width;
    for (let y=0; y<canvas.height; y+=step)
      for (let x=0; x<canvas.width; x+=step)
        if (img.data[(y*cw+x)*4+3]>128) {
          const ox=x/dpr, oy=y/dpr;
          pts.push({x:ox,y:oy,ox,oy,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,color:pColor(x/canvas.width)});
        }
    let mx=-1000, my=-1000;
    canvas.onmousemove = e => { const r=canvas.getBoundingClientRect(); mx=(e.clientX-r.left)*(W/r.width); my=(e.clientY-r.top)*(H/r.height); };
    canvas.onmouseleave = () => { mx=-1000; my=-1000; };
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      for (const p of pts) {
        const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<100&&mx>0){const f=(100-d)/100;p.vx-=(dx/d)*f*12;p.vy-=(dy/d)*f*12;}
        p.vx+=(p.ox-p.x)*.08;p.vy+=(p.oy-p.y)*.08;p.vx*=.85;p.vy*=.85;p.x+=p.vx;p.y+=p.vy;
        ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,1.4,0,Math.PI*2);ctx.fill();
      }
      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(rafRef.current);
  }, [id]);
  return <canvas id={id} style={{display:'block',height:'56px',width:'100%',touchAction:'none'}} />;
}

function Spinner() {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{animation:'spin .7s linear infinite'}}><path d="M12 2a10 10 0 0 1 10 10"/></svg>;
}

const ROLES = [
  { id:'pentester', label:'Penetration Tester', sub:'Offensive security testing', cls:'r', color:'#ef5350', rgba:'rgba(229,57,53',
    icon: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ef5350" strokeWidth="2" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> },
  { id:'rtlead', label:'Red Team Lead', sub:'Operation planning & lead', cls:'r', color:'#c0273d', rgba:'rgba(192,39,61',
    icon: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c0273d" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg> },
  { id:'soceng', label:'Social Engineer', sub:'Human exploitation ops', cls:'r', color:'#f97316', rgba:'rgba(249,115,22',
    icon: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f97316" strokeWidth="2" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> },
  { id:'maldev', label:'Malware Developer', sub:'Payload & exploit dev', cls:'r', color:'#a855f7', rgba:'rgba(168,85,247',
    icon: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#a855f7" strokeWidth="2" strokeLinecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> },
  { id:'other',  label:'Other', sub:'Specify your role below', cls:'r', color:'#9ca3b7', rgba:'rgba(156,163,175',
    icon: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9ca3b7" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg> },
];

function App() {
  const [name,     setName]     = useState('');
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [showPw,   setShowPw]   = useState(false);
  const [role,     setRole]     = useState('');
  const [otherRole, setOtherRole] = useState('');
  const [withCo,   setWithCo]   = useState(false);
  const [company,  setCompany]  = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);
  const [done,     setDone]     = useState(false);

  const handleSubmit = () => {
    if (!name.trim())           { setError('Please enter your name.'); return; }
    if (!email.trim())          { setError('Please enter your email.'); return; }
    if (password.length < 8)    { setError('Password must be at least 8 characters.'); return; }
    if (!role)                  { setError('Please select your role.'); return; }
    if (role === 'other' && !otherRole.trim()) { setError('Please specify your role.'); return; }
    if (withCo && !company.trim()) { setError('Please enter your company name.'); return; }
    setLoading(true); setError('');
    setTimeout(() => {
      setLoading(false); setDone(true);
      setTimeout(() => { window.location.href = 'red-login.html'; }, 2000);
    }, 1100);
  };

  const roleLabel = role === 'other' ? (otherRole || 'Other') : (ROLES.find(r => r.id === role)?.label || '');

  if (done) return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(rgba(255,255,255,.026) 1px,transparent 1px),radial-gradient(ellipse at 50% -10%,rgba(192,39,61,.16) 0%,transparent 52%),#0d0305',backgroundSize:'28px 28px,100% 100%',color:'#f7f8ff',padding:'40px 24px'}}>
      <div style={{textAlign:'center',animation:'slide-up .5s cubic-bezier(.22,1,.36,1) both'}}>
        <div style={{width:'70px',height:'70px',borderRadius:'50%',background:'rgba(67,211,159,.11)',border:'1px solid rgba(67,211,159,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 22px'}}>
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#43d39f" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 style={{fontSize:'24px',fontWeight:'800',letterSpacing:'-.025em',margin:'0 0 10px',color:'#f7f8ff'}}>Account Created!</h1>
        <p style={{color:'#9ca3b7',fontSize:'14px',lineHeight:'1.7',margin:'0 0 28px',maxWidth:'320px',marginLeft:'auto',marginRight:'auto'}}>Redirecting you to sign in and set up your team…</p>
        <div style={{height:'3px',borderRadius:'999px',background:'rgba(255,255,255,.07)',overflow:'hidden',marginBottom:'14px'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#c0273d,#ff6b6b)',borderRadius:'999px',animation:'prog 1.8s cubic-bezier(.4,0,.2,1) forwards'}}></div>
        </div>
        <p style={{fontSize:'12px',color:'#6f7689'}}>{roleLabel} · Red Team</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(rgba(255,255,255,.026) 1px,transparent 1px),radial-gradient(ellipse at 50% -10%,rgba(192,39,61,.16) 0%,transparent 52%),radial-gradient(ellipse at 85% 85%,rgba(229,57,53,.07) 0%,transparent 48%),#0d0305',backgroundSize:'28px 28px,100% 100%,100% 100%',color:'#f7f8ff',padding:'40px 24px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,width:'400px',height:'400px',background:'radial-gradient(circle at 20% 20%,rgba(192,39,61,.07) 0%,transparent 70%)',pointerEvents:'none'}}></div>
      <div style={{position:'absolute',bottom:0,right:0,width:'400px',height:'400px',background:'radial-gradient(circle at 80% 80%,rgba(229,57,53,.05) 0%,transparent 70%)',pointerEvents:'none'}}></div>

      {/* Back button */}
      <div style={{position:'fixed',top:'28px',left:'32px'}}>
        <a href="red-home.html" style={{display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'rgba(255,120,100,.6)',textDecoration:'none',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',fontFamily:'Inter,sans-serif',transition:'color .2s'}}
          onMouseOver={e=>e.currentTarget.style.color='rgba(255,120,100,1)'}
          onMouseOut={e=>e.currentTarget.style.color='rgba(255,120,100,.6)'}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Red Team
        </a>
      </div>

      <div style={{width:'100%',maxWidth:'480px',animation:'slide-up .55s cubic-bezier(.22,1,.36,1) both'}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <img src="assets/ATTENSELOGO.png" style={{width:'68px',height:'68px',objectFit:'contain',mixBlendMode:'screen',filter:'drop-shadow(0 0 18px rgba(192,39,61,.5)) drop-shadow(0 0 36px rgba(34,211,238,.2))',animation:'float 4s ease-in-out infinite',marginBottom:'12px'}} alt="Attense" />
          <div style={{width:'100%',height:'56px',marginBottom:'10px'}}>
            <ParticleCanvas id="reg-canvas" />
          </div>
          <div style={{display:'inline-flex',alignItems:'center',gap:'7px',padding:'5px 12px',borderRadius:'999px',background:'rgba(255,107,107,.08)',border:'1px solid rgba(255,107,107,.2)',color:'#ff6b6b',fontSize:'11px',fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',marginBottom:'10px'}}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Join the Red Team
          </div>
          <p style={{color:'#9ca3b7',fontSize:'13px',margin:0,lineHeight:'1.65'}}>Create your account, pick your role, and enter adversary operations.</p>
        </div>

        {/* Error */}
        {error && (
          <div style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'12px 15px',borderRadius:'10px',background:'rgba(255,105,120,.08)',border:'1px solid rgba(255,105,120,.24)',color:'#ff8a94',fontSize:'13px',marginBottom:'16px',lineHeight:'1.55'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{flexShrink:0,marginTop:'1px'}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {error}
          </div>
        )}

        {/* Name + email */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}}>
          <div>
            <label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#c8cde0',marginBottom:'6px'}}>Full name</label>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Jane Smith" className="inp" />
          </div>
          <div>
            <label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#c8cde0',marginBottom:'6px'}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@anywhere.com" className="inp" />
          </div>
        </div>

        {/* Password */}
        <div style={{marginBottom:'16px'}}>
          <label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#c8cde0',marginBottom:'6px'}}>Password</label>
          <div style={{position:'relative'}}>
            <input type={showPw?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Create a password (8+ characters)" className="inp" style={{paddingRight:'44px'}} />
            <button onClick={()=>setShowPw(p=>!p)} style={{position:'absolute',right:0,top:0,width:'44px',height:'44px',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#6f7689'}}>
              {showPw
                ? <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                : <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
        </div>

        {/* Role selector */}
        <div style={{marginBottom:'16px'}}>
          <label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#c8cde0',marginBottom:'8px'}}>Your role</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
            {ROLES.map(r => (
              <div key={r.id} className={`gc gc-${r.cls}${role===r.id?' sel':''}`} onClick={()=>{setRole(r.id);setError('');}}>
                <div className="gc-ray" style={{background:`radial-gradient(ellipse at 50% 0%,${r.rgba},.18),transparent 70%)`}}></div>
                <div className="gc-dot" style={{background:r.color,boxShadow:`0 0 8px 2px ${r.rgba},.5)`}}></div>
                <div className="bl topl"></div><div className="bl leftl"></div><div className="bl bottoml"></div><div className="bl rightl"></div>
                <div style={{display:'flex',alignItems:'center',gap:'8px',paddingTop:'8px'}}>
                  <div style={{width:'26px',height:'26px',borderRadius:'7px',background:`${r.rgba},.1)`,border:`1px solid ${r.rgba},.2)`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{r.icon}</div>
                  <div><div style={{fontSize:'12px',fontWeight:700,color:'#f7f8ff'}}>{r.label}</div><div style={{fontSize:'11px',color:'#9ca3b7'}}>{r.sub}</div></div>
                </div>
              </div>
            ))}
          </div>
          {/* Other role text input */}
          {role === 'other' && (
            <div style={{marginTop:'10px',animation:'slide-up .3s cubic-bezier(.22,1,.36,1) both'}}>
              <input type="text" value={otherRole} onChange={e=>setOtherRole(e.target.value)} placeholder="e.g. OSINT Analyst, C2 Operator…" className="inp" style={{height:'40px',borderColor:'rgba(229,57,53,.4)'}} />
            </div>
          )}
        </div>

        {/* Company toggle */}
        <div style={{marginBottom:'16px'}}>
          <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',padding:'12px 14px',borderRadius:'10px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.08)',transition:'border-color .15s'}}>
            <input type="checkbox" checked={withCo} onChange={e=>setWithCo(e.target.checked)} style={{width:'15px',height:'15px',accentColor:'#c0273d',cursor:'pointer',flexShrink:0}} />
            <div>
              <div style={{fontSize:'13px',fontWeight:600,color:'#f7f8ff'}}>Register with company information</div>
              <div style={{fontSize:'12px',color:'#9ca3b7',marginTop:'1px'}}>Add your organization details to your profile</div>
            </div>
          </label>
        </div>

        {/* Company fields */}
        {withCo && (
          <div style={{marginBottom:'16px',padding:'16px',borderRadius:'12px',background:'rgba(192,39,61,.04)',border:'1px solid rgba(192,39,61,.16)',display:'flex',flexDirection:'column',gap:'10px',animation:'slide-up .3s cubic-bezier(.22,1,.36,1) both'}}>
            <div style={{fontSize:'11px',fontWeight:700,color:'#ff8a9a',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:'2px'}}>Company Details</div>
            <div>
              <label style={{display:'block',fontSize:'12px',fontWeight:600,color:'#c8cde0',marginBottom:'5px'}}>Company name <span style={{color:'#ef5350'}}>*</span></label>
              <input type="text" value={company} onChange={e=>setCompany(e.target.value)} placeholder="e.g. Acme Corp" className="inp" style={{height:'40px'}} />
            </div>
          </div>
        )}

        {/* Submit */}
        <button className="pb" style={{width:'100%'}} onClick={handleSubmit}>
          <div className="pb-wrap" style={{width:'100%',justifyContent:'center'}}>
            {loading && <Spinner />}
            <span>✧</span>{loading ? 'Joining Red Team…' : 'Join Red Team →'}
          </div>
        </button>

        <p style={{textAlign:'center',color:'#6f7689',fontSize:'13px',margin:'20px 0 0'}}>
          Already have an account? <a href="red-login.html" style={{color:'#c0273d',textDecoration:'none',fontWeight:600}}>Sign in</a>
        </p>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
