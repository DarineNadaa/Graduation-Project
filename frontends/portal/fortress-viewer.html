<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/ATTENSELOGO.png">
<link rel="shortcut icon" type="image/png" href="assets/ATTENSELOGO.png">
<link rel="apple-touch-icon" href="assets/ATTENSELOGO.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTENSE — Command Center</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:grab; }
  body.dragging { cursor:grabbing; }
  canvas { display:block; position:fixed; inset:0; width:100%!important; height:100%!important; }

  /* ── Team buttons ── */
  .team-buttons {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 clamp(2rem, 6vw, 7rem) clamp(3rem, 7vh, 6rem);
  }

  .team-btn {
    pointer-events: all;
    display: flex;
    align-items: center;
    gap: 0.9rem;
    padding: 1.1rem 2.2rem;
    border: none;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.72rem, 1.2vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.22s cubic-bezier(0.23,1,0.32,1),
                box-shadow 0.22s cubic-bezier(0.23,1,0.32,1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .team-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
  }
  .team-btn:hover { transform: translateY(-3px) scale(1.025); }
  .team-btn:hover::before { opacity: 1; }
  .team-btn:active { transform: translateY(0) scale(0.98); }

  /* Red team */
  .team-btn.red {
    background: rgba(180, 18, 42, 0.18);
    border: 1.5px solid rgba(220, 30, 55, 0.55);
    color: #ff4d6a;
    box-shadow: 0 0 24px rgba(220,30,55,0.22), inset 0 0 20px rgba(220,30,55,0.06);
  }
  .team-btn.red::before { background: rgba(220,30,55,0.12); }
  .team-btn.red:hover {
    box-shadow: 0 0 40px rgba(220,30,55,0.45), 0 8px 32px rgba(0,0,0,0.4),
                inset 0 0 30px rgba(220,30,55,0.10);
    border-color: rgba(255,60,80,0.80);
  }

  /* Blue team */
  .team-btn.blue {
    background: rgba(14, 44, 125, 0.18);
    border: 1.5px solid rgba(36, 84, 199, 0.55);
    color: #5b9fff;
    box-shadow: 0 0 24px rgba(36,84,199,0.22), inset 0 0 20px rgba(36,84,199,0.06);
  }
  .team-btn.blue::before { background: rgba(36,84,199,0.12); }
  .team-btn.blue:hover {
    box-shadow: 0 0 40px rgba(36,84,199,0.45), 0 8px 32px rgba(0,0,0,0.4),
                inset 0 0 30px rgba(36,84,199,0.10);
    border-color: rgba(80,130,255,0.80);
  }

  /* Arrow icon */
  .btn-arrow {
    width: 1em; height: 1em;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-arrow svg { width:100%; height:100%; }

  /* ── Loading overlay ── */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.6rem;
    background: #000;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  .loading-overlay.hidden { opacity: 0; visibility: hidden; }
  .loading-ring {
    width: 48px; height: 48px;
    border: 2px solid rgba(255,255,255,0.08);
    border-top-color: rgba(91,159,255,0.7);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* ── Drag hint ── */
  .drag-hint {
    position: fixed;
    bottom: clamp(2.5rem, 5vh, 4.5rem);
    left: 50%; transform: translateX(-50%);
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.22);
    text-transform: uppercase;
    pointer-events: none;
    display: flex; align-items: center; gap: 0.5rem;
    transition: opacity 0.6s;
  }
  .drag-hint.hidden { opacity: 0; }
  .drag-hint-icon { width: 16px; height: 16px; opacity: 0.5; }

  /* ── Vignette ── */
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.65) 100%);
  }

  /* ── Corner labels ── */
  .corner-label {
    position: fixed; z-index: 8;
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    pointer-events: none;
  }
  .corner-label.tl { top: 2rem; left: 2.5rem; }
  .corner-label.tr { top: 2rem; right: 2.5rem; text-align: right; }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loader">
  <div class="loading-ring"></div>
  <div class="loading-text">Initializing defense matrix</div>
</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Corner labels -->
<div class="corner-label tl">ATTENSE<br>COMMAND CENTER</div>
<div class="corner-label tr">DRAG TO ROTATE</div>

<!-- Drag hint center -->
<div class="drag-hint" id="dragHint">
  <svg class="drag-hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M12 3v18M3 12h18" stroke-linecap="round"/>
  </svg>
  Drag to explore
</div>

<!-- Team buttons -->
<div class="team-buttons">
  <a href="red-home.html" class="team-btn red">
    <div class="btn-arrow">
      <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 9L9 1M9 1H1M9 1V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    Enter as Red Team
  </a>

  <a href="blue-home.html" class="team-btn blue">
    Enter as Blue Team
    <div class="btn-arrow">
      <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 9L9 1M9 1H1M9 1V9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function(){
  'use strict';

  var W = window.innerWidth, H = window.innerHeight;

  // ── Renderer ──────────────────────────────────────────
  var R = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  R.setSize(W, H);
  R.setPixelRatio(Math.min(devicePixelRatio, 2));
  R.setClearColor(0x000000, 0);
  R.outputEncoding = THREE.sRGBEncoding;
  R.toneMapping = THREE.ACESFilmicToneMapping;
  R.toneMappingExposure = 0.85;
  R.shadowMap.enabled = true;
  document.body.appendChild(R.domElement);

  // ── Scene / Camera ────────────────────────────────────
  var scene = new THREE.Scene();
  scene.background = null;

  var camera = new THREE.PerspectiveCamera(48, W/H, 0.1, 100);
  camera.position.set(0, 1.5, 14);
  camera.lookAt(0, 0, 0);

  window.addEventListener('resize', function(){
    W = window.innerWidth; H = window.innerHeight;
    R.setSize(W, H);
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
  });

  // ── Lights ────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0d1530, 0.7));

  var key = new THREE.DirectionalLight(0x5577cc, 2.0);
  key.position.set(-4, 10, 6);
  key.castShadow = true;
  scene.add(key);

  var fill = new THREE.DirectionalLight(0x1133aa, 0.5);
  fill.position.set(6, 2, -4);
  scene.add(fill);

  var purpleL = new THREE.PointLight(0xcc33ff, 6, 18);
  purpleL.position.set(0, 3, 0);
  scene.add(purpleL);

  var cyanL = new THREE.PointLight(0x00ffee, 3.5, 14);
  cyanL.position.set(2, 2, 4);
  scene.add(cyanL);

  var redL = new THREE.PointLight(0xff1133, 2.8, 12);
  redL.position.set(-3, 1, 3);
  scene.add(redL);

  // ── Particles ─────────────────────────────────────────
  var pN = 100;
  var pPos = new Float32Array(pN * 3);
  var pSpd = new Float32Array(pN);
  for (var i = 0; i < pN; i++) {
    var a = Math.random() * Math.PI * 2;
    var r = 4 + Math.random() * 4;
    pPos[i*3]   = Math.cos(a) * r;
    pPos[i*3+1] = (Math.random() - 0.5) * 8;
    pPos[i*3+2] = Math.sin(a) * r;
    pSpd[i] = (Math.random() - 0.5) * 0.007;
  }
  var pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
    color: 0x44ffee, size: 0.06,
    transparent: true, opacity: 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false
  })));

  // Ground shadow catcher
  var ground = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.ShadowMaterial({ opacity: 0.25 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -3.5;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Drag-to-rotate state ──────────────────────────────
  var isDragging   = false;
  var prevMouse    = { x: 0, y: 0 };
  var autoRotSpeed = 0.22;   // radians/sec (auto)
  var dragVel      = 0;      // leftover momentum after drag
  var rotY         = 0;      // accumulated Y rotation
  var rotX         = 0;      // vertical tilt (clamped)
  var DRAG_SENS    = 0.008;
  var MOMENTUM     = 0.92;   // drag momentum decay
  var DRAG_EASE_IN = 0.06;   // lerp back to auto-rotate

  function getXY(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onPointerDown(e) {
    isDragging = true;
    prevMouse = getXY(e);
    dragVel = 0;
    document.body.classList.add('dragging');
    // Hide drag hint after first interaction
    var hint = document.getElementById('dragHint');
    if (hint) { hint.classList.add('hidden'); }
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    var xy = getXY(e);
    var dx = xy.x - prevMouse.x;
    var dy = xy.y - prevMouse.y;
    dragVel  = dx * DRAG_SENS;
    rotY    += dx * DRAG_SENS;
    rotX    += dy * DRAG_SENS * 0.4;
    rotX     = Math.max(-0.45, Math.min(0.45, rotX));
    prevMouse = xy;
  }

  function onPointerUp() {
    isDragging = false;
    document.body.classList.remove('dragging');
  }

  // Mouse
  document.addEventListener('mousedown',  onPointerDown);
  document.addEventListener('mousemove',  onPointerMove);
  document.addEventListener('mouseup',    onPointerUp);
  // Touch
  document.addEventListener('touchstart', onPointerDown, { passive: true });
  document.addEventListener('touchmove',  onPointerMove, { passive: true });
  document.addEventListener('touchend',   onPointerUp);

  // ── Load GLB ──────────────────────────────────────────
  var fort = null;
  var loader = new THREE.GLTFLoader();
  loader.load('assets/fortress.glb', function(gltf){
    fort = gltf.scene;

    // Centre + fit
    var box = new THREE.Box3().setFromObject(fort);
    var ctr = box.getCenter(new THREE.Vector3());
    fort.position.sub(ctr);
    var sz = box.getSize(new THREE.Vector3()).length();
    fort.scale.setScalar(9.5 / sz);

    // Boost emissive
    fort.traverse(function(child){
      if (!child.isMesh) return;
      child.castShadow = true;
      var mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(function(m){
        if (m.emissive) m.emissiveIntensity = Math.max((m.emissiveIntensity||0), 0.3) + 0.5;
        m.needsUpdate = true;
      });
    });

    scene.add(fort);

    // Hide loader
    var loader2 = document.getElementById('loader');
    if (loader2) loader2.classList.add('hidden');
  }, undefined, function(err){
    console.error('GLB load error:', err);
    var loader2 = document.getElementById('loader');
    if (loader2) loader2.classList.add('hidden');
  });

  // ── Animation loop ────────────────────────────────────
  var t = 0;
  var prevTime = performance.now();

  (function anim(now){
    requestAnimationFrame(anim);
    var dt = Math.min((now - prevTime) / 1000, 0.05);
    prevTime = now;
    t += dt;

    if (fort) {
      if (isDragging) {
        // Direct control
        fort.rotation.y = rotY;
        fort.rotation.x = rotX;
      } else {
        // Momentum coast then auto-rotate
        dragVel *= MOMENTUM;
        rotY += dragVel;
        rotY += autoRotSpeed * dt;   // auto-rotate resumes
        rotX += (0 - rotX) * 0.03;  // ease back to level

        fort.rotation.y = rotY;
        fort.rotation.x = rotX;
        fort.position.y = Math.sin(t * 0.7) * 0.18;
      }
    }

    // Pulse lights
    purpleL.intensity = 7   + Math.sin(t * 2.1) * 2.5;
    cyanL.intensity   = 4   + Math.sin(t * 1.7 + 1) * 1.8;
    redL.intensity    = 3   + Math.sin(t * 3.1) * 1.2;

    // Subtle camera drift
    camera.position.y = 1.5 + Math.sin(t * 0.28) * 0.15;
    camera.lookAt(0, 0, 0);

    // Particles
    for (var p = 0; p < pN; p++) {
      pPos[p*3+1] += pSpd[p];
      if (pPos[p*3+1] >  4) pPos[p*3+1] = -4;
      if (pPos[p*3+1] < -4) pPos[p*3+1] =  4;
    }
    pGeo.attributes.position.needsUpdate = true;

    R.render(scene, camera);
  })(prevTime);

})();
</script>
</body>
</html>
